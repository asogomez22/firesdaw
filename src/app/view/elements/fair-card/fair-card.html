<div class="card h-100 shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-start bg-white">
    <h6 class="card-title mb-0 me-2">{{ fair().activityName }}</h6>
    <button class="btn btn-sm p-0 border-0 fs-5" [class.text-warning]="isFavorite()" [class.text-secondary]="!isFavorite()" (click)="toggle()">
      {{ isFavorite() ? '★' : '☆' }}
    </button>
  </div>
  <div class="card-body">
    <p class="mb-1 small"><strong>Població:</strong> {{ fair().municipalityName }}</p>
    <p class="mb-1 small"><strong>Data:</strong> {{ fair().date }}</p>
    <p class="mb-1 small"><strong>Lloc:</strong> {{ fair().location }}</p>
    <p class="mb-1 small"><strong>Sector:</strong> {{ fair().sectorName }}</p>
    @if (fair().products) {
      <p class="mb-1 small"><strong>Productes:</strong> {{ fair().products }}</p>
    }
    <p class="mb-1 small"><strong>Periodicitat:</strong> {{ fair().periodicityName }}</p>
    <p class="mb-0 small"><strong>Àmbit:</strong> {{ fair().fieldName }}</p>
  </div>
</div>
